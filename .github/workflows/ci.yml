# ---------------------------------------------------------------------------
# Céal CI Pipeline — Lint → Test → Coverage
# ---------------------------------------------------------------------------
# Enforces code quality gates on every push and pull request.
# Blocks merge if any stage fails (requires branch protection rule).
#
# Architecture:
#   Stage 1 (Lint)        — ruff check, fail-fast
#   Stage 2 (Unit Tests)  — pytest tests/unit/, depends on lint
#   Stage 3 (Integration) — pytest tests/integration/, depends on unit
#   Stage 4 (Coverage)    — pytest --cov, fail-under=80%, depends on unit
#
# Resume bullet: "Designed CI/CD pipeline with 4-stage quality gates
#   (lint → unit → integration → coverage) enforcing zero-regression
#   policy across 93+ tests on Python 3.11/3.12 matrix."
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Stage 1: Lint (fail-fast — no point running tests on dirty code)
  # -----------------------------------------------------------------------
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

  # -----------------------------------------------------------------------
  # Stage 2: Unit Tests (depends on lint passing)
  # -----------------------------------------------------------------------
  unit-tests:
    name: "Unit Tests (Python ${{ matrix.python-version }})"
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  # -----------------------------------------------------------------------
  # Stage 3: Integration Tests (depends on unit tests passing)
  # -----------------------------------------------------------------------
  integration-tests:
    name: "Integration Tests (Python ${{ matrix.python-version }})"
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: true

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ceal
          POSTGRES_PASSWORD: ceal_ci
          POSTGRES_DB: ceal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests (SQLite)
        run: pytest tests/integration/ -v --tb=short

      - name: Integration tests (PostgreSQL)
        env:
          DATABASE_URL: postgresql+asyncpg://ceal:ceal_ci@localhost:5432/ceal_test
        run: |
          python -m pytest tests/integration/ -v --tb=short

  # -----------------------------------------------------------------------
  # Stage 4: Coverage (runs in parallel with integration, depends on unit)
  # -----------------------------------------------------------------------
  coverage:
    name: "Coverage Check"
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.11-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-3.11-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=80

  # -----------------------------------------------------------------------
  # Stage 5: Database Tests (PostgreSQL) — dual-backend SQL correctness
  # -----------------------------------------------------------------------
  db-tests-postgres:
    name: "Database Tests (PostgreSQL, Python ${{ matrix.python-version }})"
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ceal
          POSTGRES_PASSWORD: ceal_ci
          POSTGRES_DB: ceal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database tests against PostgreSQL
        env:
          DATABASE_URL: postgresql+asyncpg://ceal:ceal_ci@localhost:5432/ceal_test
        run: |
          python -m pytest tests/unit/test_database.py tests/unit/test_crm.py tests/unit/test_autoapply.py -v --tb=short

  # -----------------------------------------------------------------------
  # Stage 6: Docker Build Validation (depends on coverage passing)
  # -----------------------------------------------------------------------
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [coverage]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ceal:ci-${{ github.sha }} .

      - name: Verify no secrets in image
        run: |
          # Check that no database files or .env leaked into the image
          docker run --rm ceal:ci-${{ github.sha }} sh -c "find /app -name '*.db' -o -name '.env' -o -name '*.db-wal' | head -5" | tee /tmp/leaked_files
          if [ -s /tmp/leaked_files ]; then
            echo "ERROR: Secrets or database files found in Docker image!"
            exit 1
          fi

      - name: Verify health endpoint starts
        run: |
          # Start container in background
          docker run -d --name ceal-test -p 8000:8000 ceal:ci-${{ github.sha }}
          # Wait for startup
          sleep 5
          # Check health endpoint
          curl -f http://localhost:8000/health || (docker logs ceal-test && exit 1)
          # Cleanup
          docker stop ceal-test
          docker rm ceal-test
